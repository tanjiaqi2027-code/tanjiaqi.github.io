<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Web 应用</title>
	<style>
		a {
			text-decoration: none;
			color: #999;
		}

		p {
			margin-top: 30px;
		}
	</style>
	<script>
		function display(id)
		{
			let ele = document.getElementById(id);
			if (ele.style.display == 'none')
				ele.style.display = 'block';
			else
				ele.style.display = 'none';
		}
	</script>
</head>

<body style="background-color: #222; color: #FFF">
	<div style="margin: 0 auto; max-width: 1000px;">
		<header
			style="height: 70px; border-bottom: 5px solid #444; border-left: 3px solid #444; border-right: 3px solid #444;">
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="./">
				首页</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="./aboutme.html">
				关于我</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="./development.html">
				开发</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="./webapplications.html">
				Web 应用</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; color: #FFF;"
				href="./records">
				记录</a>
		</header>
		<div id="note" ; style="width: max-content; margin: 0 auto; margin-top: 10px;"
			onclick="document.getElementById('note').style.display = 'none';">
			点击开发名即可展开详细信息，点我关闭提示
		</div>
		<main style="margin-top: 50px; max-width: 1000px;">
			<div style="width: 50%; margin: 0 auto;">
				<div style="width: max-content; margin: 0 auto; font-size: x-large;"
					onclick="display('elephantheaders')">
					<strong>Elephant Headers</strong>
				</div>
				<div id="elephantheaders" onclick="" style="display: none;">
					<p>这是一组基于 C++ 开发的头文件项目，可以帮助你快速开发基于 C++ 的应用程序。</p>
					<p>目前里面包含的内容有：</p>
					<ul>
						<li>
							<div onclick="display('elephantheaders-scannerandprinter')">
								<strong>Scanner and Printer</strong>
							</div>
							<div id="elephantheaders-scannerandprinter"
								style="display: none; margin-left: 20px; margin-top: 10px">
								在你只有一个简易的读入函数（例如 recv）或输出函数（例如 send）的情况下，
								可以使用 scanner 和 printer 类来提供更多样的方法（例如 scanf 和 printf）。
								<br /><br />
								<a href="https://github.com/XiangXunyi/Scanner-and-Printer-for-Cplusplus">打开</a>
							</div>
						</li>
					</ul>
				</div>
			</div>
			<hr style="border: 1px solid #444;" />
		</main>
	</div>
</body>

</html>
