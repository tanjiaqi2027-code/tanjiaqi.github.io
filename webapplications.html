<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Web 应用</title>
	<style>
		a {
			text-decoration: none;
			color: #999;
		}

		p {
			margin-top: 30px;
		}
	</style>
</head>

<body style="background-color: #222; color: #FFF">
	<div style="margin: 0 auto; max-width: 1000px;">
		<header
			style="height: 70px; border-bottom: 5px solid #444; border-left: 3px solid #444; border-right: 3px solid #444;">
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="/">
				首页</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="/aboutme.html">
				关于我</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="/development.html">
				开发</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; border-right: 3px solid #444; color: #FFF;"
				href="/webapplications.html">
				Web 应用</a>
			<a style="display: inline-flex; align-items: center; justify-content: center; height: 100%; width: 19%; color: #FFF;"
				href="/records">
				记录</a>
		</header>
		<div id="note" ; style="width: max-content; margin: 0 auto; margin-top: 10px;"
			onclick="document.getElementById('note').style.display = 'none';">
			点击应用名即可展开详细信息，点我关闭提示
		</div>
		<main style="margin-top: 50px; max-width: 1000px;">
			<div style="width: 50%; margin: 0 auto;">
				<div style="width: max-content; margin: 0 auto; font-size: x-large;" onclick="displayOiersearcher()">
					OIer searcher
				</div>
				<div id="oiersearcher" onclick="" style="display: none;">
					<p>OIer searcher 是一个基于 javascipt 的 Web 应用，它可以帮助你通过 OIer 所参与的比赛名、成绩、所获奖项这些信息寻找最匹配的 OIer。</p>
					<p>你可以在搜索框内输入比赛名，然后在下面的列表中选择比赛以添加到你的信息列表中，点击“生成”即可生成搜索代码，然后将其复制进 OIer DB 的自定义搜索框即可。</p>
					<p><a href="/apps/oiersearch.html">打开</a></p>
				</div>
				<script>
					let oiersearcherDisplayed = false;
					function displayOiersearcher()
					{
						if (oiersearcherDisplayed)
						{
							document.getElementById("oiersearcher").style.display = "none";
							oiersearcherDisplayed = false;
						}
						else
						{
							document.getElementById("oiersearcher").style.display = "block";
							oiersearcherDisplayed = true;
						}
					}
				</script>
			</div>
			<hr style="border: 1px solid #444;" />
		</main>
	</div>
</body>

</html>
